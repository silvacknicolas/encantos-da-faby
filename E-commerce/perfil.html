<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Encantos da Faby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="container inner">
    <a href="index.html" class="nav-logo">Encantos da Faby</a>
    <div class="nav-actions">
      <a href="index.html" class="btn btn-ghost btn-sm">
        <span class="material-symbols-outlined" style="font-size:18px">storefront</span> Voltar à Loja
      </a>
      <button class="btn btn-outline btn-sm" id="logout-btn">
        <span class="material-symbols-outlined" style="font-size:18px">logout</span> Sair
      </button>
    </div>
  </div>
</header>

<main class="section">
  <div class="container">

    <!-- Profile Hero -->
    <div class="surface-card" style="display:flex;flex-wrap:wrap;gap:24px;align-items:center;margin-bottom:40px">
      <div>
        <label id="avatar-wrap" class="avatar-wrap" title="Clique para alterar a foto">
          <img id="profile-avatar-img" src="" alt="Avatar" class="hidden">
          <span class="material-symbols-outlined" id="profile-avatar-icon" style="font-size:40px;color:var(--on-surface-variant)">person</span>
          <div class="avatar-overlay">
            <span class="material-symbols-outlined">photo_camera</span>
          </div>
          <input type="file" id="avatar-input" accept="image/*" class="hidden">
        </label>
      </div>
      <div>
        <h1 class="text-headline" style="color:var(--primary)" id="profile-user-name">Carregando...</h1>
        <p style="color:var(--on-surface-variant);margin-top:4px" id="profile-user-email"></p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs" style="max-width:500px;margin-bottom:36px">
      <button class="admin-tab active" data-panel="orders" onclick="switchTab('orders')">Meus Pedidos</button>
      <button class="admin-tab" data-panel="edit" onclick="switchTab('edit')">Editar Perfil</button>
      <button class="admin-tab" data-panel="password" onclick="switchTab('password')">Senha</button>
    </div>

    <!-- Painel: Pedidos -->
    <div id="panel-orders" class="admin-panel">
      <h2 class="text-title" style="color:var(--primary);margin-bottom:24px">Meus Pedidos</h2>
      <div id="orders-container" class="grid-2">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Painel: Editar Perfil -->
    <div id="panel-edit" class="admin-panel hidden" style="max-width:480px">
      <h2 class="text-title" style="color:var(--primary);margin-bottom:24px">Editar Perfil</h2>
      <form id="profile-form" style="display:flex;flex-direction:column;gap:20px">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input type="text" class="form-input" id="pf-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Endereço de Entrega Padrão</label>
          <input type="text" class="form-input" id="pf-address" placeholder="Rua, N°, Bairro, Cidade, CEP">
          <div class="form-hint">Será usado automaticamente no checkout.</div>
        </div>
        <button type="submit" class="btn btn-primary" style="align-self:flex-start">
          <span class="material-symbols-outlined">save</span> Salvar Alterações
        </button>
      </form>
    </div>

    <!-- Painel: Senha -->
    <div id="panel-password" class="admin-panel hidden" style="max-width:480px">
      <h2 class="text-title" style="color:var(--primary);margin-bottom:24px">Alterar Senha</h2>
      <form id="password-form" style="display:flex;flex-direction:column;gap:20px">
        <div class="form-group">
          <label class="form-label">Senha Atual</label>
          <input type="password" class="form-input" id="pf-current-password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nova Senha</label>
          <input type="password" class="form-input" id="pf-new-password" placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar Nova Senha</label>
          <input type="password" class="form-input" id="pf-confirm-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="align-self:flex-start">
          <span class="material-symbols-outlined">lock_reset</span> Alterar Senha
        </button>
      </form>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">© 2024 Encantos da Faby · Feito com 🌸 e muito crochê</div>
  </div>
</footer>

<div class="toast-container" id="toast-container"></div>

<script type="module">
  import { initAuth, onAuthChange, logout } from "./js/auth.js";
  import { initPerfil }                     from "./js/perfil.js";

  window.switchTab = (panel) => {
    document.querySelectorAll(".admin-tab").forEach(t => t.classList.toggle("active", t.dataset.panel === panel));
    document.querySelectorAll(".admin-panel").forEach(p => p.classList.toggle("hidden", p.id !== `panel-${panel}`));
  };

  document.getElementById("logout-btn")?.addEventListener("click", async () => {
    await logout();
    window.location.href = "index.html";
  });

  initAuth();
  onAuthChange(user => {
    if (user === null) { window.location.href = "index.html"; return; }
    if (user) initPerfil();
  });
</script>
</body>
</html>
